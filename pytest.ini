[pytest]
testpaths = tests
pythonpath = .

# Default run excludes long tests — they may take minutes and are meant for overnight runs.
# Override with: pytest -m long        (only long tests)
#                pytest -m ""          (all tests including long)
addopts = -m "not long"

markers =
    long: long-running tests (multi-step scenarios, inventory fill, far travel + deposit)

# Live logs in terminal during test run — shows requests/responses as they happen
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Full debug log saved to file after each run — useful for reconstructing failures
log_file = logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
log_file_mode = w
